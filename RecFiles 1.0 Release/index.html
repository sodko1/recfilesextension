<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>RecFiles</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">RF</div>
          <div>
            <div class="brand-title">RecFiles</div>
            <div class="brand-subtitle">Local assets</div>
          </div>
        </div>

        <button id="thisPcButton" class="nav-item active" type="button">
          <span class="nav-icon disk-icon"></span>
          <span>This PC</span>
        </button>
        <button id="homeButton" class="nav-item" type="button">
          <span class="nav-icon home-icon"></span>
          <span>Home</span>
        </button>

        <div class="nav-heading">Drives</div>
        <div id="driveList" class="drive-list"></div>
      </aside>

      <section class="content">
        <header class="topbar">
          <div class="history">
            <button id="backButton" class="tool-button" title="Back" aria-label="Back" type="button">Back</button>
            <button id="upButton" class="tool-button" title="Up" aria-label="Up" type="button">Up</button>
            <button id="refreshButton" class="tool-button" title="Refresh" aria-label="Refresh" type="button">Refresh</button>
          </div>
          <input id="pathInput" class="path-input" spellcheck="false" />
        </header>

        <section class="filters">
          <input id="filterInput" class="search-input" placeholder="Search files..." spellcheck="false" />
          <label class="toggle">
            <input id="showProtectedToggle" type="checkbox" />
            <span>Protected</span>
          </label>
        </section>

        <section id="drivePills" class="drive-pills" aria-label="Drives"></section>

        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>

        <section id="fileGrid" class="file-grid" aria-label="Files"></section>

        <footer class="actions">
          <div id="status" class="status">Ready</div>
          <button id="revealButton" class="action-button" disabled type="button">Reveal</button>
          <button id="importButton" class="action-button primary" disabled type="button">Import</button>
        </footer>
      </section>
    </main>

    <script src="./js/app.js"></script>
  </body>
</html>
